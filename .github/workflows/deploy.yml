name: Deploy to WP Engine

on:
  push:
    branches:
      - main
      - stg
      - qa
      - dev

jobs:
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Lint PHP files
        run: find . -name '*.php' -not -path './vendor/*' | xargs -r php -l

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set WP Engine environment
        id: env
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          if [ "$BRANCH" = "main" ]; then
            echo "WPE_ENV=${{ secrets.WPE_PROD_ENV_NAME }}" >> $GITHUB_ENV
          elif [ "$BRANCH" = "stg" ]; then
            echo "WPE_ENV=${{ secrets.WPE_STAGING_ENV_NAME }}" >> $GITHUB_ENV
          elif [ "$BRANCH" = "qa" ]; then
            echo "WPE_ENV=${{ secrets.WPE_STAGING_ENV_NAME }}" >> $GITHUB_ENV
          elif [ "$BRANCH" = "dev" ]; then
            echo "WPE_ENV=${{ secrets.WPE_DEV_ENV_NAME }}" >> $GITHUB_ENV
          fi

      - name: Deploy via SSH to WP Engine
        env:
          WPE_SSHG_KEY_PRIVATE: ${{ secrets.WPE_SSHG_KEY_PRIVATE }}
        run: |
          echo "$WPE_SSHG_KEY_PRIVATE" | base64 --decode > /tmp/wpe_key
          chmod 600 /tmp/wpe_key
          mkdir -p ~/.ssh
          ssh-keyscan -p 22 git.wpengine.com >> ~/.ssh/known_hosts
          git remote add wpe git@git.wpengine.com:production/${WPE_ENV}.git
          git push wpe HEAD:master --force
