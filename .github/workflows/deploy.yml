name: Deploy to WP Engine

on:
  push:
    branches:
      - main
      - stg
      - qa
      - dev

jobs:
  php-lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: phpcs, phpstan

      - name: PHP Syntax Check
        run: find . -name "*.php" -not -path "./vendor/*" | xargs -I{} php -l {}

      - name: WordPress Coding Standards
        run: |
          composer require --dev wp-coding-standards/wpcs squizlabs/php_codesniffer
          ./vendor/bin/phpcs --standard=WordPress --extensions=php --ignore=vendor/ .
        continue-on-error: true

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: php-lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set WP Engine environment name
        id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "WPE_ENV=${{ secrets.WPE_PROD_ENV_NAME }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == "refs/heads/stg" ]]; then
            echo "WPE_ENV=${{ secrets.WPE_STAGING_ENV_NAME }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == "refs/heads/qa" ]]; then
            echo "WPE_ENV=${{ secrets.WPE_STAGING_ENV_NAME }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "WPE_ENV=${{ secrets.WPE_DEV_ENV_NAME }}" >> $GITHUB_ENV
          fi

      - name: Setup known_hosts for WP Engine SSH
        run: |
          mkdir -p /root/.ssh
          ssh-keyscan -t rsa ssh.wpengine.net >> /root/.ssh/known_hosts
          chmod 644 /root/.ssh/known_hosts

      - name: Deploy to WP Engine
        uses: wpengine/github-action-wpe-site-deploy@v3
        with:
          WPE_SSHG_KEY_PRIVATE: ${{ secrets.WPE_SSHG_KEY_PRIVATE }}
          WPE_ENV: ${{ env.WPE_ENV }}
